# =============================================================================
# PostgreSQL-based Ingest Pipeline with Test Data Generation
# =============================================================================
dag_id: example_ingest_pipeline_postgres
schedule: "@daily"

generate_test_data:
  rows: 100
  schema:
    id: integer
    name: string
    created_at: timestamp
    amount: float
    is_active: boolean
    transformed: boolean      # ← Add this
    value_upper: string       # ← Add this

resources:
  main_db:
    type: business_lib.infrastructure.storage.postgres_adapter.PostgresAdapter
    config:
      connection_string: ${WAREHOUSE_DB_URL}
      table_name: test_data

workflow:
  - id: generate_test_data
    rows: 100
    schema:
      id: integer
      name: string
      created_at: timestamp
      amount: float
      is_active: boolean
      transformed: boolean
      value_upper: string
    business_module: business_lib.services.generate_test_data_service
    business_function: GenerateTestDataService.generate
    depends_on: [ ]
    inject:
      storage: main_db

  - id: extract
    business_module: business_lib.services.extract_service
    business_function: ExtractService.extract_data
    depends_on: [generate_test_data]
    inject:
      storage: main_db

  - id: transform
    business_module: business_lib.services.transform_service
    business_function: TransformService.transform_data
    depends_on: [extract]
    inject:
      storage: main_db

  - id: load
    business_module: business_lib.services.load_service
    business_function: LoadService.load_to_warehouse
    depends_on: [transform]
    inject:
      storage: main_db

  - id: remove_test_data
    business_module: business_lib.services.remove_test_data_service
    business_function: RemoveTestDataService.remove
    depends_on: [load]
    inject:
      storage: main_db