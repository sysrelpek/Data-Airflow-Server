dag_id: "postgres_ingest_v1"
steps:
  - id: "collect"
    business_module: "business_lib.services.ingest.feature_ingest"
    business_function: "collect_data"
    parameters:
      file_path: "/opt/airflow/data/raw_features.csv"
    depends_on: []

  - id: "process"
    business_module: "business_lib.services.ingest.feature_ingest"
    business_function: "clean_and_transform"
    depends_on: ["collect"]

  - id: "store"
    business_module: "business_lib.services.ingest.feature_ingest"
    business_function: "store_data"
    depends_on: ["process"]
    inject:
      storage: "main_db"

  - id: "verify"
    business_module: "business_lib.services.ingest.feature_ingest"
    business_function: "verify_storage"
    depends_on: ["store"]
    inject:
      storage: "main_db"
