# src/business_lib/services/finance/payments.py

def process(payment_data, storage, cache):
    # 1. Kolla snabbt i Redis om vi nyss sett denna transaktion (Idempotens-check)
    if cache.exists(payment_data['id']):
        return "Already processed"

    # 2. Utför affärslogik...

    # 3. Spara permanent i PostgreSQL
    storage.save_transaction(payment_data)
    
    # 4. Uppdatera Redis-cache för framtida snabba uppslag
    cache.set(payment_data['id'], "processed", expire=3600)
