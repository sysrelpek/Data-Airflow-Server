# env_config_production.yaml

# 1. Define the physical Adapters for this environment
resources:
  customer_db:
    type: "infrastructure.adapters.RedisAdapter" # Points to the specific class
    config:
      host: "10.0.5.20"
      port: 6379

  audit_logger:
    type: "infrastructure.adapters.ApiAdapter"
    config:
      url: "https://internal.com"

# 2. Define the Business Flow
workflow:
  - id: "onboard_new_customer"
    business_module: "services.finance.onboarding"
    business_function: "execute"
    # The Factory injects the resource into the Port (argument)
    inject:
      storage: "customer_db"
      logger: "audit_logger"
